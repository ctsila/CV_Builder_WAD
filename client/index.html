<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Resume Generator — MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Resume Generator — MVP</h1>
      <section>
        <h2>Master Profile (JSON)</h2>
        <textarea id="profile" placeholder='Paste a JSON profile or sample (see README)'></textarea>
        <button id="saveProfile">Save Profile</button>
      </section>

      <section>
        <h2>Vacancy Text</h2>
        <textarea id="vacancy" placeholder="Paste job posting text or URL"></textarea>
        <button id="analyze">Analyze Vacancy</button>
      </section>

      <section>
        <h2>Compare & Generated Outputs</h2>
        <div style="display:flex; gap:12px; align-items:flex-start;">
          <div style="flex:1">
            <h3>Job Analysis</h3>
            <pre id="analysis" style="min-height:120px"></pre>
          </div>
          <div style="flex:1">
            <h3>Generated Resume</h3>
            <pre id="result"></pre>
          </div>
          <div style="flex:1">
            <h3>Generated Cover Letter</h3>
            <pre id="cover"></pre>
          </div>
        </div>
        <div style="margin-top:8px">
          <button id="generate">Generate Resume</button>
          <button id="compare">Compare (analysis + outputs)</button>
          <button id="exportText">Export Text</button>
        </div>
      </section>
    </div>
    <script src="main.js"></script>
  </body>
  </html>
