<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Resume Generator — MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Resume Generator — MVP</h1>
      <section>
        <h2>Master Profile</h2>
        <div style="display:flex; gap:12px; align-items:flex-start;">
          <div style="flex:1">
            <label>Upload resume (PDF or DOCX):</label>
            <input type="file" id="resumeFile" accept=".pdf,.doc,.docx,text/plain" />
            <button id="uploadResume">Upload & Parse</button>
            <div style="margin-top:8px">
              <label>Or paste your resume text:</label>
              <textarea id="profile" placeholder='Paste resume text or JSON profile'></textarea>
              <button id="saveProfile">Save Profile</button>
            </div>
          </div>
          <div style="width:220px">
            <label>Target country/region</label>
            <select id="region">
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
              <option value="EU">Europe</option>
              <option value="DE">Germany</option>
              <option value="UAE">UAE</option>
              <option value="GLOBAL">Global</option>
            </select>
            <div style="margin-top:12px">
              <button id="importSample">Load Sample Profile</button>
              <button id="importVacancy">Load Sample Vacancy</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>Vacancy Text</h2>
        <textarea id="vacancy" placeholder="Paste job posting text or URL"></textarea>
        <button id="analyze">Analyze Vacancy</button>
      </section>

      <section>
        <h2>Compare & Generated Outputs</h2>
        <div style="display:flex; gap:12px; align-items:flex-start;">
          <div style="flex:1">
            <h3>Job Analysis</h3>
            <pre id="analysis" style="min-height:120px"></pre>
          </div>
          <div style="flex:1">
            <h3>Generated Resume</h3>
            <pre id="result"></pre>
          </div>
          <div style="flex:1">
            <h3>Generated Cover Letter</h3>
            <pre id="cover"></pre>
          </div>
        </div>
        <div style="margin-top:8px">
          <button id="generate">Generate Resume</button>
          <button id="compare">Compare (analysis + outputs)</button>
          <button id="exportText">Export Text</button>
          <button id="exportPdf">Export PDF</button>
          <button id="interviewBtn">Generate Interview Prep</button>
        </div>
      </section>
    </div>
    <script src="main.js"></script>
  </body>
  </html>
